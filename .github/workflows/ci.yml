name: Continuous Integration

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Instalar dependencias do frontend
        working-directory: Frontend
        run: npm ci

      - name: Executar lint do frontend
        working-directory: Frontend
        run: npm run lint

      - name: Gerar build do frontend
        working-directory: Frontend
        run: npm run build

      - name: Executar testes do frontend se existirem
        working-directory: Frontend
        run: npm test --if-present

  backend:
    name: Backend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Instalar dependencias do backend
        working-directory: Backend
        run: npm ci

      - name: Gerar Prisma Client
        working-directory: Backend
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Compilar backend
        working-directory: Backend
        run: npm run build

      - name: Executar testes do backend se existirem
        working-directory: Backend
        run: npm test --if-present